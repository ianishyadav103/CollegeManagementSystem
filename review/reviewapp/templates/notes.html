<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/header.css">
    <title>Document</title>
    <style>
        #theme-btn {
            border: 2px solid rgb(255, 255, 255);
            background-color: black;
            color: white;
            padding: 3px;
            border-radius: 5px;
            cursor: pointer;
            position: fixed;
            top: 75px;
            right: 5px;
        }

        .white {
            background-image: url("/static/home_back.webp");
            background-attachment: fixed;
            cursor: url('/static/new_cursor.png') 5 4, auto;

        }

        .black {
            background-image: url("/static/home_back.png");
            background-attachment: fixed;
            cursor: url('/static/new_cursor_black.png') 5 4, auto;


        }

        .h_f {
            display: none;
        }

        #sub {
            margin: auto;
            margin-top: 70px;
            font-family: cursive;
            font-size: 25px;
            width: 80vw;
            user-select: none;
        }

        .sub_notes_elements {
            margin-bottom: 25px;
            padding: 10px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .sub_notes_elements_files {
            margin: auto;
            margin-bottom: 12px;
            padding: 10px;
            font-size: 15px;
            width: 70vw;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;

        }

        .break_me_notes_name {
            word-break: break-all;
            margin-left: 10px;
            display: flex;
        }

        .sub_notes_elements:hover {
            background-color: aquamarine;
            scale: 1.03;
        }

        .icon-notes {
            height: 30px;

        }

        .icon-notes:hover {
            cursor: pointer;

        }

        #file_upload_notes {
            height: 30px;

            color: white;
            background-color: rgb(151, 0, 255);
        }

        form {
            background-color: beige;
            width: max-content;
            padding: 18px;
            border-radius: 10px;
            margin: auto;
            margin-top: 50px;
            font-size: 20px;
        }

        #sub_btn-notes {
            width: 100px;
            height: 30px;
            font-size: 20px;
            background-color: rgb(29, 230, 211);
            border-radius: 9px;
            cursor: pointer;
            float: right;
        }

        #notes_about_input {
            width: 400px;

        }

        .download_notes_btn {
            text-decoration: none;
            background-color: black;
            border-radius: 10px;
            padding: 6px;
            box-sizing: border-box;
            color: aliceblue;




        }

        .delete_notes_btn {
            text-decoration: none;
            background-color: rgb(255, 255, 255);
            border-radius: 10px;
            padding: 6px;
            box-sizing: border-box;
            color: rgb(255, 0, 0);
            margin-right: 5px;



        }

        .notes_hidden {
            display: none;
        }
    </style>
</head>
<header ondragstart="return false">
    <a href="/"><img id="logo-img" src="/static/logox.png" alt="logo-icon"></a>
    <div id="search-div">
        <input id="search-box" autocomplete="off" type="text">
        <img id="search-logo" src="/static/search_icon.png" alt="search_icon">
    </div> <!--hidden for students-->
    <a class="header-links" href="/">Home</a>
    <a class="header-links" href="/xlogout">Logout</a>
    <div id="profile">
        <img id="profile-icon" src="/static/profile_icon.webp" alt="profile">
        <div id="username">{{ data.name }}</div>
        <img id="drop-icon" src="/static/drop_arrow_icon.png" alt="drop_icon">
    </div>

</header>

<body>
    <button onclick="theme_change()" id="theme-btn">Dark</button>

    <div id="sub">
        {% for x in all_sub %}

        <div class="sub_notes_elements" onclick="hide_notes()">
            <span>{{ x.sem_course.course.c_name }}</span><span>{{x.sub_name }} <img class="icon-notes h_f"
                    onclick="add_notes('{{ x.id }}')" src="/static/add_file.png" alt="drop_icon"></span><span>Div/Group:
                {{ x.div_group }}</span>
        </div>
        <div class="notes_hidden">
            {% for y in notes_x %}
            {% if y.sub_n.id == x.id %}
            <div class="sub_notes_elements_files"><span class="break_me_notes_name">{{ y.name }}</span><span><a
                        class="delete_notes_btn h_f" href="/delete_notes/{{ y.id }}">Delete</a><a
                        class="download_notes_btn" href="/media/{{ y.file_n }}">Download</a></span></div>
            {% endif %}
            {% endfor %}
        </div>

        {% endfor %}

    </div>
    <script src="/static/js/header.js"></script>
    <script>
        function add_notes(sub_id) {
            event.currentTarget.src = "/static/edit-icon.png"
            event.currentTarget.style.cursor = "default"
            event.currentTarget.parentElement.parentElement.style.mar
            let current_Sub = event.currentTarget.parentElement.parentElement.outerHTML
            document.getElementById("sub").innerHTML = current_Sub +
                `<form action="/savenotes/${sub_id}" enctype="multipart/form-data" method="post">
                        {% csrf_token %}
                        About: <input id="notes_about_input" name="name" required type="text" maxlength="50"><br><br>
                        <input required type="file" name="notes_file" id="">
                        <input type="submit" id="sub_btn-notes" value="Submit">
                    </form>`;


        }
        function hide_notes() {
            let temp = event.currentTarget.nextElementSibling;
            if(temp != null && temp.className != ""){

                if (temp.style.display == "") {
                    temp.style.display = "unset"
                }
                else {
                    temp.style.display = ""
                }
            }

        }
        if ("{{ data.qualifications }}" != "") {
            let f = document.getElementsByClassName("h_f");
            for (let i = 0; i < f.length; i++) {
                f[i].style.display = "unset";
            }
        }
        function change_theme_combine(n) {
            let btn = document.getElementById("theme-btn");
            let by = document.getElementsByTagName("body")[0];
            let hr = document.getElementsByTagName("header")[0];
            let sb = document.getElementById("search-box").style;
            let de = document.getElementsByClassName("sub_notes_elements")
            if (n == "1") {
                for (let i = 0; i < de.length; i++) {
                    de[i].style.backgroundColor = "bisque"
                    de[i].style.color = "black"
                    de[i].style.boxShadow = "0px 0px 10px black";
                    let temp = de[i].nextElementSibling.children;
                    for (let j = 0; j < temp.length; j++) {
                        console.log(temp[j])
                        temp[j].style.color = "black";
                        temp[j].style.backgroundColor = "#f196ef";
                        temp[j].style.boxShadow = "0px 0px 5px black";

                    }

                }
                btn.textContent = "Dark";
                btn.style.backgroundColor = "black";
                btn.style.color = "white";
                by.className = "white"
                theme = "white";

                hr.style.backgroundColor = "#80ffd4";
                hr.style.color = "black";
                document.getElementsByClassName("header-links")[0].style.color = "#551a8b";
                document.getElementsByClassName("header-links")[1].style.color = "#551a8b";
                sb.color = "black";
                sb.backgroundColor = "white";
                icon_arrow_cross.src = "/static/cross_icon.png"
                icon_arrow_cross.src = "/static/drop_arrow_icon.png"
            }
            else if (n == 2) {
                for (let i = 0; i < de.length; i++) {
                    de[i].style.backgroundColor = "rgb(34, 33, 31)"
                    de[i].style.color = "#1eea9d"
                    de[i].style.boxShadow = "0px 0px 10px aquamarine";
                    let temp = de[i].nextElementSibling.children;

                    for (let j = 0; j < temp.length; j++) {
                        console.log(temp[j])
                        temp[j].style.color = "white";
                        temp[j].style.backgroundColor = "rgb(34, 33, 31)";
                        temp[j].style.boxShadow = "0px 0px 8px yellow";

                    }
                }

                btn.textContent = "Light";
                btn.style.backgroundColor = "white";
                btn.style.color = "black";
                by.className = "black";
                theme = "black";

                hr.style.backgroundColor = "black";
                hr.style.color = "aqua";
                document.getElementsByClassName("header-links")[0].style.color = "aqua";
                document.getElementsByClassName("header-links")[1].style.color = "aqua";
                sb.color = "white";
                sb.backgroundColor = "black";
                icon_arrow_cross.src = "/static/cross_icon_w.png"
                icon_arrow_cross.src = "/static/drop_arrow_icon_w.png"
            }
        }
        function theme_change() {

            if (sessionStorage.getItem("theme") == "dark") {
                sessionStorage.setItem("theme", "light")
                change_theme_combine("1")
            }
            else if (sessionStorage.getItem("theme") == "light") {
                sessionStorage.setItem("theme", "dark")
                change_theme_combine("2")


            }

        }

        (function () {
            if (sessionStorage.getItem("theme") == null) {
                let darTheme = window.matchMedia("(prefers-color-scheme:dark)");
                if (darTheme.matches) {
                    sessionStorage.setItem("theme", "dark")
                    change_theme_combine("2")

                }
                else {
                    sessionStorage.setItem("theme", "light")
                    change_theme_combine("1")

                }

            }
            else {
                if (sessionStorage.getItem("theme") == "light") {
                    change_theme_combine("1")


                }
                else if (sessionStorage.getItem("theme") == "dark") {
                    change_theme_combine("2")


                }
            }

        })()
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/logo.png" type="image/x-icon">
    <link rel="shortcut icon" href="/static/logo.png" type="image/x-icon">
    <title>Document</title>
    <style>
        html {
            width: 100%;
            height: 100%;

        }

        .white {
            background-image: url("https://images.pexels.com/photos/733857/pexels-photo-733857.jpeg?auto=compress&cs=tinysrgb&w=1400");
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: 100% 100%;



        }

        .black {
            background-image: url("https://images.pexels.com/photos/370717/pexels-photo-370717.jpeg?auto=compress&cs=tinysrgb&w=1200");
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: 100% 100%;



        }

        #f_black {
            background-color: black;
            color: aqua;
            box-shadow: 0px 0px 30px aqua;

        }

        form {
            font-size: 30px;
            width: 550px;
            padding: 10px;
            display: flex;
            margin: auto;
            margin-bottom: auto;
            margin-top: 24vh;
            flex-direction: column;
            align-items: center;
            row-gap: 15px;
        }

        #f_white {
            background-color: aliceblue;


            box-shadow: 0px 0px 30px burlywood;


        }

        input[type=radio] {
            width: 46px;
            height: 27px;
            accent-color: aqua;
            cursor: pointer;
        }

        #data_enter {
            text-align: center;
            display: grid;
            grid-template-columns: 230px 260px;
            row-gap: 15px;

        }

        #login_text {
            font-size: 50px;
            padding: 5px
        }

        #submit_btn {
            width: 100px;
            height: 50px;
            font-size: 25px;
            background-color: rgb(171, 219, 230);
            border-radius: 9px;
            cursor: pointer;

        }

        #submit_btn:hover {
            border: 4px solid aqua;

        }

        @media screen and (max-width: 600px) {
            form {

                margin-top: 10vh;
                width: 90%;

            }

            #radio_login_type {
                font-size: 28px;
                flex-direction: column;
                display: flex;

            }

            #radio_login_type span {
                margin-bottom: 10px;

            }

            input[type=radio] {
                width: 36px;
                height: 27px;
                ;
            }

            #data_enter {
                grid-template-columns: 100%;

            }
        }

        #theme-btn {
            border: 2px solid rgb(255, 255, 255);
            background-color: black;
            color: white;
            padding: 3px;
            border-radius: 5px;
            cursor: pointer;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        #forgot_p {
            font-size: 20px;
            color: red;
        }
    </style>
</head>

<body>
    <button onclick="theme_change(event.currentTarget)" id="theme-btn">Dark</button>
    <form action="/login_form_validate/" method="post">
        <div id="login_text">Login</div>
        {% csrf_token %}
        <div id="radio_login_type">
            <span><input type="radio" name="login_as" required value="student">Student</span>
            <span><input type="radio" name="login_as" value="faculty">Faculty</span>
            <span><input type="radio" name="login_as" value="coordinator">Admin</span>
        </div>
        <div id="data_enter">
            <span id="us_text">Username:</span> <input id="user_n" name="username" type="text" required>
            <span class="pass_inp">Password:</span> <input class="pass_inp" type="password" name="password" required>
        </div>
        <span id="forgot_p" onclick="forgot_p()">forgot password ?</span>
        <input id="submit_btn" type="submit" value="Login">

    </form>
</body>
<script>
    let verify_otp;
    let log_re = function () {
        window.location.href = "/"
    }
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                // Does this cookie string begin with the name we want?
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }

        return cookieValue;
    }
    const csrftoken = getCookie('csrftoken');
    function send_otp() {
        let p_e = document.getElementsByClassName("pass_inp")[0];
        let data_e = document.getElementById("user_n");

        let f = document.querySelector('input[name="login_as"]:checked');
        let data = data_e.value;
        if (data != "" && f != null) {
            document.getElementById("login_text").textContent = "Wait *";

            fetch('/send_mail_p/', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest', //anything to do here for isolating users
                    'X-CSRFToken': csrftoken,

                },
                body: JSON.stringify({ 'post_data': data + "," + f.value })
            }).then(response => {
                return response.json()
            })
                .then(sent => {
                    if (sent['my_data'] == "yes") {
                        verify_otp = function () {
                            if (data_e.value != "") {

                                fetch('/get_mail_p/', {
                                    method: 'POST',
                                    credentials: 'same-origin',
                                    headers: {
                                        'Accept': 'application/json',
                                        'X-Requested-With': 'XMLHttpRequest', //anything to do here for isolating users
                                        'X-CSRFToken': csrftoken,

                                    },
                                    body: JSON.stringify({ 'post_data': data_e.value + "," + data })
                                }).then(response => {
                                    return response.json()
                                })
                                    .then(sent => {
                                        if (sent['my_data'] == "yes") {
                                            document.getElementById("login_text").textContent = "Enter New *";
                                            document.getElementById("forgot_p").textContent = "Verified";
                                            document.getElementById("submit_btn").value = "Update"
                                            data_e.value = "";
                                            data_e.style.display = "none";

                                            p_e.style.display = "unset";
                                            p_e.value = "";

                                            verify_otp = function () {
                                                //passwrd strong can be applied here
                                                if (p_e.value != "") {

                                                    fetch('/set_p/', {
                                                        method: 'POST',
                                                        credentials: 'same-origin',
                                                        headers: {
                                                            'Accept': 'application/json',
                                                            'X-Requested-With': 'XMLHttpRequest', //anything to do here for isolating users
                                                            'X-CSRFToken': csrftoken,

                                                        },
                                                        body: JSON.stringify({ 'post_data': p_e.value + "," + data })
                                                    }).then(response => {
                                                        return response.json()
                                                    })
                                                        .then(sent => {
                                                            if (sent['my_data'] == "yes") {
                                                                document.getElementById("login_text").textContent = "Done !";

                                                                p_e.value = "";
                                                                p_e.style.display = "none";
                                                                document.getElementById("forgot_p").textContent = "Updated";
                                                                document.getElementById("submit_btn").value = "Login"
                                                                document.getElementById("submit_btn").setAttribute("onclick", 'log_re()')


                                                            }
                                                            else if (sent['my_data'] == "no") {
                                                                document.getElementById("forgot_p").textContent = "Some Error Occurred";
                                                            }



                                                        })
                                                }
                                            }


                                        }
                                        else if (sent['my_data'] == "no") {
                                            document.getElementById("forgot_p").textContent = "Invalid OTP";
                                        }



                                    })
                            }
                        }
                        document.getElementById("login_text").textContent = "Enter OTP";
                        document.getElementById("forgot_p").textContent = "OTP Sent " + sent['n'];
                        document.getElementById("submit_btn").value = "Verify"
                        document.getElementById("radio_login_type").style.display = "none";
                        data_e.value = "";
                        document.getElementById("us_text").parentElement.style.display = "block";
                        document.getElementById("us_text").style.display = "none";
                        document.getElementById("submit_btn").setAttribute("onclick", 'verify_otp()')


                    }
                    else if (sent['my_data'] == "no") {
                        document.getElementById("forgot_p").textContent = "Invalid Credentials";
                    }

                    else if (sent['my_data'] == "count") {
                        document.getElementById("forgot_p").textContent = "Maximum Trials Reached";
                    }


                })

        }
        else {
            document.getElementById("forgot_p").textContent = "Both Required";

        }




    }
    function forgot_p() {
        document.getElementsByClassName("pass_inp")[0].remove()
        document.getElementsByClassName("pass_inp")[0].style.display = "none";
        document.getElementById("forgot_p").textContent = "";
        document.getElementById("submit_btn").type = "button"
        document.getElementById("submit_btn").value = "Send"
        document.getElementById("submit_btn").setAttribute("onclick", 'send_otp()')
        document.getElementById("login_text").textContent = "Reset *";
        document.getElementsByTagName("form")[0].action = ""




    }
    let html_x = document.getElementsByTagName("html")[0].style;

    function theme_change(btn) {
        let b = document.getElementsByTagName("body")[0];
        let f = document.getElementsByTagName("form")[0];

        if (sessionStorage.getItem("theme") == "dark") {
            btn.textContent = "Dark";
            btn.style.backgroundColor = "black";
            btn.style.color = "white";
            sessionStorage.setItem("theme", "light")
            f.id = "f_white";
            b.className = "white"
            html_x.cursor = "url('/static/new_cursor.png') 5 4, auto"

        }
        else if (sessionStorage.getItem("theme") == "light") {
            sessionStorage.setItem("theme", "dark")
            b.className = "black"
            f.id = "f_black";
            btn.textContent = "Light";
            btn.style.backgroundColor = "white";
            btn.style.color = "black";
            html_x.cursor = "url('/static/new_cursor_black.png') 5 4, auto"


        }

    }
    (function () {
        let btn = document.getElementById("theme-btn");
        let b = document.getElementsByTagName("body")[0];
        let f = document.getElementsByTagName("form")[0];
        if (sessionStorage.getItem("theme") == null) {
            let darTheme = window.matchMedia("(prefers-color-scheme:dark)");
            if (darTheme.matches) {
                sessionStorage.setItem("theme", "dark")
                b.className = "black"
                f.id = "f_black";
                btn.textContent = "Light";
                btn.style.backgroundColor = "white";
                btn.style.color = "black";
                html_x.cursor = "url('/static/new_cursor_black.png') 5 4, auto"
            }
            else {
                sessionStorage.setItem("theme", "light")
                btn.textContent = "Dark";
                btn.style.backgroundColor = "black";
                btn.style.color = "white";
                f.id = "f_white";
                b.className = "white"
                html_x.cursor = "url('/static/new_cursor.png') 5 4, auto"
            }

        }
        else {
            if (sessionStorage.getItem("theme") == "light") {
                btn.textContent = "Dark";
                btn.style.backgroundColor = "black";
                btn.style.color = "white";
                f.id = "f_white";
                b.className = "white"
                html_x.cursor = "url('/static/new_cursor.png') 5 4, auto"

            }
            else if (sessionStorage.getItem("theme") == "dark") {
                b.className = "black"
                f.id = "f_black";
                btn.textContent = "Light";
                btn.style.backgroundColor = "white";
                btn.style.color = "black";
                html_x.cursor = "url('/static/new_cursor_black.png') 5 4, auto"


            }
        }

    })()

</script>

</html>

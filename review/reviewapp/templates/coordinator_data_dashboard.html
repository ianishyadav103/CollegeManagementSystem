<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/header.css">
    <title>Document</title>
    <style>
        #for_heading {
            text-align: center;
            color: brown;
            background-color: aliceblue;
            font-family: cursive;
            background-color: aquamarine;
            margin-bottom: 20px;
        }

        #main_outer_admin_div {
            margin-top: 30px;
            font-size: 20px;
            background-color: whitesmoke;
        }

        #div_options {
            display: flex;
            justify-content: space-evenly;
            font-size: 30px;
        }

        .spec_option_span {
            border-bottom: 4px solid blue;
            /* out of box */
            width: -moz-available;
            width: -webkit-fill-available;
        }

        .spec_option_span2 {
            border-bottom: 4px solid blue;
            cursor: pointer;
        }

        #div_options span {
            padding: 7px;
            box-sizing: border-box;

        }

        #current_admin_div {
            display: flex;
            margin: auto;
            margin-top: 30px;
            flex-direction: column;
            width: 60vw;
            min-height: max-content;
            justify-content: space-evenly;
            min-height: 40vh;
            padding-bottom: 40px;


        }

        .course_select,
        #semester_select,
        input,
        textarea {
            font-size: 20px;
            padding: 4px;


        }

        form {
            margin: auto;
            font-size: 25px;
            padding: 10px;
            background-color: aliceblue;
            box-shadow: 15px 7px 57px #888;
            ;
        }

        #form_div {
            display: grid;
            grid-template-columns: 240px 240px;
            row-gap: 10px;
        }

        #type {
            display: none;
        }

        .links_add_admin span {
            background-color: aquamarine;
            padding: 5px;
            border-radius: 10px;
            width: 250px;
            text-align: center;
            border: 2px solid;
        }

        .links_add_admin {
            margin-top: 20px;
            display: flex;
            justify-content: space-evenly;
            font-size: 25px;


        }

        .links_add_admin span:hover {
            background-color: aquamarine;
            cursor: pointer;
            scale: 1.04;

        }

        #sub_btn_admin {
            display: block;
            margin: auto;
            width: 30%;
            margin-top: 30px;
            background-color: aquamarine;


        }

        #sub_btn_admin:hover {
            cursor: pointer;
            scale: 1.04;
        }

        #spec_admin_tab {
            border: 4px solid blue;
            border-bottom: none;
            cursor: pointer;
        }

        #major_admin_task_div {
            width: max-content;
            background-color: #40c3d1;
            padding: 10px;
            align-self: center;
            font-size: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-family: cursive;
        }
    </style>
</head>
<header ondragstart="return false">
    <a href="/"><img id="logo-img" src="/static/logox.png" alt="logo-icon"></a>
    <div id="search-div">
        <input id="search-box" autocomplete="off" type="text">
        <img id="search-logo" src="/static/search_icon.png" alt="search_icon">
    </div> <!--hidden for students-->
    <a class="header-links" href="/">Home</a>
    <a class="header-links" href="/xlogout">Logout</a>
    <div id="profile">
        <img id="profile-icon" src="/static/profile_icon.webp" alt="profile">
        <div id="username">{{ data.name }}</div>
        <img id="drop-icon" src="/static/drop_arrow_icon.png" alt="drop_icon">
    </div>

</header>

<body>
    <div id="main_outer_admin_div">
        <div id="div_options"><span class="spec_option_span"></span><span id="spec_admin_tab"
                onclick="set_current_div()">Course</span><span class="spec_option_span"></span><span
                class="spec_option_span2" onclick="set_current_div()">Faculty</span><span
                class="spec_option_span"></span><span class="spec_option_span2"
                onclick="set_current_div()">Coordinators</span><span class="spec_option_span"></span></div>
        <div id="current_admin_div">
            <select autocomplete="off" name="course" onchange="get_sem()" class="course_select">
                <option disabled selected value="">Select Course</option>
                {% for x in courses_d %}
                <option value="{{ x.id }}">{{ x.c_name }} {{ x.batch }}</option>
                {% endfor %}
            </select>


            <select autocomplete="off" name="semester" id="semester_select" onchange="open_options_course()">
                <option disabled selected value="">Select Semester</option>

            </select>
            <div class='links_add_admin'><span onclick="add_course_form()">Add Course</span><span
                    onclick="add_course_form()">Add Semester</span>
            </div>


        </div>
    </div>
    <script>
        let cur_div = document.getElementById("current_admin_div")
        let c_id;
        let sem_id;
        let sem;
        let c_name;
        function set_current_div() {
            let temp = event.currentTarget

            if (temp.textContent == "Course") {
                window.location.href = "/home/coordinator/admin"

                temp.nextElementSibling.nextElementSibling.style.border = "none";
                temp.nextElementSibling.nextElementSibling.style.borderBottom = "4px solid blue";
                temp.nextElementSibling.nextElementSibling.nextElementSibling.nextElementSibling.style.border = "none";
                temp.nextElementSibling.nextElementSibling.nextElementSibling.nextElementSibling.style.borderBottom = "4px solid blue";
            }
            else if (temp.textContent == "Faculty") {
                cur_div.innerHTML = `<form action="/home/coordinator/admin/save/" method="post"><div id="for_heading">Add Faculty Member</div>
                    {% csrf_token %}
                <input autocomplete="off" value="Add Faculty Member" required type="text" name="type" id="type">
                <div id="form_div">

                    Name:<input autocomplete="off" maxlength="25" required type="text" name="name" class="c_details">
                    Email: <input type="email" autocomplete="off" required name="email" placeholder="example@sicsr.ac.in">
                    Qualifications: <textarea name="qualifications" autocomplete="off" required maxlength="200" cols="25" rows="10"></textarea>
                    Password: <input autocomplete="off" maxlength="30" required type="password" name="password" class="c_details">
                </div>
                <input id="sub_btn_admin" required type="submit" value="Submit">
            </form>`;
                temp.style.border = "4px solid blue";
                temp.style.borderBottom = "none";
                temp.nextElementSibling.nextElementSibling.style.border = "none";
                temp.nextElementSibling.nextElementSibling.style.borderBottom = "4px solid blue";
                temp.previousElementSibling.previousElementSibling.style.border = "none";
                temp.previousElementSibling.previousElementSibling.style.borderBottom = "4px solid blue";
            }
            else if (temp.textContent == "Coordinators") {
                cur_div.innerHTML = `<form action="/home/coordinator/admin/save/" method="post"><div id="for_heading">Add Coordinators</div>
                    {% csrf_token %}
                <input autocomplete="off" value="Add Coordinators" required type="text" name="type" id="type">
                <div id="form_div">

                    First name: <input autocomplete="off" maxlength="25" required type="text" name="first_name" class="c_details">
                    Last name: <input autocomplete="off" maxlength="25" required type="text" name="last_name" class="c_details">
                    Email: <input type="email" autocomplete="off" required name="email" placeholder="example@sicsr.ac.in">
                    Password: <input autocomplete="off" maxlength="30" required type="password" name="password" class="c_details">
                </div>
                <input id="sub_btn_admin" required type="submit" value="Submit">
            </form>`;
                temp.style.border = "4px solid blue";
                temp.style.borderBottom = "none";
                temp.previousElementSibling.previousElementSibling.previousElementSibling.previousElementSibling.style.border = "none";
                temp.previousElementSibling.previousElementSibling.previousElementSibling.previousElementSibling.style.borderBottom = "4px solid blue";
                temp.previousElementSibling.previousElementSibling.style.border = "none";
                temp.previousElementSibling.previousElementSibling.style.borderBottom = "4px solid blue";

            }
        }





        function get_sem() {
            temp = document.getElementsByClassName('course_select')[0]
            c_id = temp.value;
            c_name = temp.options[temp.selectedIndex].text;
            let s = `<option disabled selected value="null">Select Semester</option>`;
            "{% for x in semester_d %}"
            if ('{{ x.course.id }}' == c_id) {
                s = s + `<option value="{{ x.id }}">{{ x.sem }}</option>`
            }
            "{% endfor %}"
            document.getElementById("semester_select").innerHTML = s;

        }
        function add_data_excel() {
            let text_c = event.currentTarget.textContent;
            event.currentTarget.setAttribute("onclick", "")
            window.location.href = `/media/excel_templates/${text_c}.xlsx`
            event.currentTarget.innerHTML = `<form action="/home/coordinator/admin/save/" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input required value="${text_c + "," + c_id + "," + sem_id}" autocomplete="off" type="text" name="type" id="type">
            <input name="admin_excel" type="file" autocomplete="off" accept=".xlsx" required>
            <input id="submit-btn" type="submit" value="Submit">
            </form>`
        }
        function open_options_course() {
            temp = event.currentTarget;
            sem = temp.options[temp.selectedIndex].text;
            sem_id = temp.value
            cur_div.innerHTML = `<div id="major_admin_task_div">${c_name} Sem: ${sem}</div><div class='links_add_admin'><span onclick="add_data_excel()">Add Students</span></div><div class='links_add_admin'><span onclick="add_data_excel()">Add Subjects</span></div><div class='links_add_admin'><span onclick="add_data_excel()">Assign Electives</span></div>`;
        }


        function add_course_form() {
            let s;
            if (event.currentTarget.textContent == "Add Course") {
                s = `<form action="/home/coordinator/admin/save/" method="post"><div id="for_heading">Add Course</div>
                    {% csrf_token %}
                <input required value="course" autocomplete="off" type="text" name="type" id="type">
                <div id="form_div">
                    Course: <input required autocomplete="off" type="text" name="c_name" class="c_details">
                Start Year: <input required autocomplete="off" min="2021" max="3000" type="number" name="start_year" class="c_details">
                EndYear: <input required autocomplete="off" min="2021" max="3000" type="number" name="end_year" class="c_details">
                Total Sem: <input required autocomplete="off" max="10" type="number" name="total_sem" class="c_details"></div>
               <input id="sub_btn_admin" required type="submit" value="Submit">

            </form>`
            }
            else if (event.currentTarget.textContent == "Add Semester") {
                s = `<form action="/home/coordinator/admin/save/" method="post"><div id="for_heading">Add Semester</div>
                    {% csrf_token %}
                <input autocomplete="off" value="sem" required type="text" name="type" id="type">
                <div id="form_div">

                    Course: <select autocomplete="off" required name="course" class="course_select">
                        <option disabled selected value="">Select Course</option>
                        {% for x in courses_d %}
                        <option value="{{ x.id }}">{{ x.c_name }} {{ x.batch }}</option>
                        {% endfor %}
                    </select>
                    Semester:<input autocomplete="off" required max="10" type="number" name="sem" class="c_details">
                    Semester Start: <input type="date" autocomplete="off" required name="start_date">
                    Semester End: <input autocomplete="off" type="date" required name="end_date">
                </div>
                <input id="sub_btn_admin" required type="submit" value="Submit">
            </form>`
            }

            cur_div.innerHTML = s;

        }
    </script>
</body>
<script src="/static/js/header.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/header.css">
    <title>Document</title>
    <style>
        #theme-btn {
            border: 2px solid rgb(255, 255, 255);
            background-color: black;
            color: white;
            padding: 3px;
            border-radius: 5px;
            cursor: pointer;
            position: fixed;
            top: 75px;
            right: 5px;
        }

        .white {
            background-image: url("/static/home_back.webp");
            background-attachment: fixed;
            cursor: url('/static/new_cursor.png') 5 4, auto;

        }

        .black {
            background-image: url("/static/home_back.png");
            background-attachment: fixed;
            cursor: url('/static/new_cursor_black.png') 5 4, auto;


        }

        #details {
            font-family: cursive;
        }

        .detail_element {
            margin: auto;
            margin-top: 20px;
            font-size: 25px;
            height: 240px;

            width: 780px;
            padding: 30px;
            border-radius: 20px;
            padding-bottom: 35px;

        }


        canvas {
            float: right;
        }

        .sub_name {
            font-size: 27px;
            font-weight: bold;

        }

        .att_link {
            text-decoration: none;
            border: 2px solid black;
            padding: 4px;
            border-radius: 4px;
            background-color: orange;
            color: white;
        }

        .att_link_cont {
            margin-top: 5px;
            display: flex;
            justify-content: space-between;


        }
    </style>
</head>
<header ondragstart="return false">
    <a href="/"><img id="logo-img" src="/static/logox.png" alt="logo-icon"></a>
    <div id="search-div">
        <input id="search-box" autocomplete="off" type="text">
        <img id="search-logo" src="/static/search_icon.png" alt="search_icon">
    </div> <!--hidden for students-->
    <a class="header-links" href="/">Home</a>
    <a class="header-links" href="/xlogout">Logout</a>
    <div id="profile">
        <img id="profile-icon" src="/static/profile_icon.webp" alt="profile">
        <div id="username">{{ data.name }}</div>
        <img id="drop-icon" src="/static/drop_arrow_icon.png" alt="drop_icon">
    </div>

</header>

<body>
    <button onclick="theme_change()" id="theme-btn">Dark</button>
    <div id="details">

    </div>
    <script src="/static/js/header.js"></script>
    <script>
        function assign() {
            let sub = []
            let total = []
            let count = []
            let content = document.getElementById("details")
            let content_html = "";
            "{% for x in all_sub %}"


            total.push("{{ x.credit }}" * 15)
            sub.push("{{ x.sub_name }}" + "{{ x.div_group }}")
            count.push("{{ x.count }}")

            if ("{{x.last_modified}}" != "None") {
                content_html = content_html + `<div class = "detail_element"><canvas id="{{ x.sub_name }}{{ x.div_group }}"></canvas> <span class = "sub_name">{{ x.sub_name }}</span><br>Div/Group: {{ x.div_group }}<br>Conducted: {{ x.count }} <br>Remaining: ${('{{ x.credit }}' * 15) - '{{ x.count }}'}<br>Last Edited by: {{x.last_modified_by}} <br>Last Edited: ${"{{x.last_modified}}".replace(":", "/")}<br><div class="att_link_cont"><a class="att_link" href="/takeattendance/{{ x.sub_name }}:){{ x.id }}">Take Attendance</a><a class="att_link" href="/checkattendance/{{ x.sub_name }}:){{ x.id }}">Check Attendance</a></div></div>`;
            }
            else {
                content_html = content_html + `<div class = "detail_element"><canvas id="{{ x.sub_name }}{{ x.div_group }}"></canvas> <span class = "sub_name">{{ x.sub_name }}</span><br>Div/Group: {{ x.div_group }}<br>Conducted: {{ x.count }} <br>Remaining: ${('{{ x.credit }}' * 15) - '{{ x.count }}'}<br>Last Edited by: {{x.last_modified_by}} <br>Last Edited: ${"{{x.last_modified}}".replace(":", "/")}<br><div class="att_link_cont"><a class="att_link" href="/takeattendance/{{ x.sub_name }}:){{ x.id }}">Take Attendance</a></div></div>`;
            }

            "{% endfor %}"
            content.innerHTML = content_html;

            let ctx;
            let data;

            for (let i = 0; i < sub.length; i++) {

                c = document.getElementById(sub[i])
                let size = 200;
                c.style.width = size + "px";
                c.style.height = size + "px";

                let scale = window.devicePixelRatio;
                c.width = size * scale;
                c.height = size * scale;


                let ctx = c.getContext("2d");
                ctx.scale(scale, scale);


                let conducted = count[i];
                let remaining = total[i];

                let end2 = (conducted / remaining) * 2

                ctx.beginPath();
                ctx.lineWidth = 25;
                ctx.strokeStyle = 'rgb(212, 17, 222)'
                ctx.arc((c.width / scale) / 2, (c.height / scale) / 2, 80, 0, 2 * Math.PI);
                ctx.stroke();
                ctx.closePath()

                ctx.beginPath();
                ctx.lineWidth = 15;
                ctx.strokeStyle = 'rgb(0, 255, 255)'
                ctx.arc((c.width / scale) / 2, (c.height / scale) / 2, 80, 0, end2 * Math.PI);
                ctx.stroke();
                ctx.closePath()
                ctx.save();




                ctx.translate((c.width / scale) / 2, (c.height / scale) / 2)
                ctx.rotate(90 * Math.PI / 180)
                ctx.font = "40px cursive";
                ctx.fillStyle = "red";
                ctx.textAlign = "center";
                let p = Math.trunc(conducted / remaining * 100) + "%"

                ctx.fillText(p, 15, 15);
                ctx.restore()
                c.style.transform = "rotate(-0.25turn)";
            }





        }
        assign()
        function change_theme_combine(n) {
            let btn = document.getElementById("theme-btn");
            let by = document.getElementsByTagName("body")[0];
            let hr = document.getElementsByTagName("header")[0];
            let sb = document.getElementById("search-box").style;
            let de = document.getElementsByClassName("detail_element")
            if (n == "1") {
                for (let i = 0; i < de.length; i++) {
                    de[i].style.backgroundColor = "antiquewhite"
                    de[i].style.color = "black"
                }
                btn.textContent = "Dark";
                btn.style.backgroundColor = "black";
                btn.style.color = "white";
                by.className = "white"
                theme = "white";

                hr.style.backgroundColor = "#80ffd4";
                hr.style.color = "black";
                document.getElementsByClassName("header-links")[0].style.color = "#551a8b";
                document.getElementsByClassName("header-links")[1].style.color = "#551a8b";
                sb.color = "black";
                sb.backgroundColor = "white";
                icon_arrow_cross.src = "/static/cross_icon.png"
                icon_arrow_cross.src = "/static/drop_arrow_icon.png"
            }
            else if (n == 2) {
                for (let i = 0; i < de.length; i++) {
                    de[i].style.backgroundColor = "rgb(34, 33, 31)"
                    de[i].style.color = "white"

                }

                btn.textContent = "Light";
                btn.style.backgroundColor = "white";
                btn.style.color = "black";
                by.className = "black";
                theme = "black";

                hr.style.backgroundColor = "black";
                hr.style.color = "aqua";
                document.getElementsByClassName("header-links")[0].style.color = "aqua";
                document.getElementsByClassName("header-links")[1].style.color = "aqua";
                sb.color = "white";
                sb.backgroundColor = "black";
                icon_arrow_cross.src = "/static/cross_icon_w.png"
                icon_arrow_cross.src = "/static/drop_arrow_icon_w.png"
            }
        }
        function theme_change() {

            if (sessionStorage.getItem("theme") == "dark") {
                sessionStorage.setItem("theme", "light")
                change_theme_combine("1")
            }
            else if (sessionStorage.getItem("theme") == "light") {
                sessionStorage.setItem("theme", "dark")
                change_theme_combine("2")


            }

        }

        (function () {
            if (sessionStorage.getItem("theme") == null) {
                let darTheme = window.matchMedia("(prefers-color-scheme:dark)");
                if (darTheme.matches) {
                    sessionStorage.setItem("theme", "dark")
                    change_theme_combine("2")

                }
                else {
                    sessionStorage.setItem("theme", "light")
                    change_theme_combine("1")

                }

            }
            else {
                if (sessionStorage.getItem("theme") == "light") {
                    change_theme_combine("1")


                }
                else if (sessionStorage.getItem("theme") == "dark") {
                    change_theme_combine("2")


                }
            }

        })()
    </script>
</body>

</html>

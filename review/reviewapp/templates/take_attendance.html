<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/header.css">
    <title>Document</title>
    <style>
        .white {
            background-image: url("/static/home_back.webp");
            background-attachment: fixed;
            cursor: url('/static/new_cursor.png') 5 4, auto;

        }

        .black {
            background-image: url("/static/home_back.png");
            background-attachment: fixed;
            cursor: url('/static/new_cursor_black.png') 5 4, auto;


        }

        #outer_div {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20vh;
        }

        #sub_details {
            font-family: cursive;
            font-size: 30px;
            background-color: antiquewhite;
            border-radius: 30px;
            padding: 35px;
        }

        .att {
            display: inline-block;
            font-weight: bold;
        }

        #start_attendace {
            float: right;
            width: 100px;
            height: 50px;
            font-size: 20px;
            color: white;
            background-color: green;
            border-radius: 12px;

        }

        #myvideo {
            display: block;
        }


        #close {
            display: block;
            margin: auto;
            margin-top: 3px;
            width: 100px;
            height: 50px;
            font-size: 20px;
            color: white;
            background-color: red;
            border-radius: 12px;

        }


        #canvas_x {
            /* border: 5px solid rgb(27, 224, 224);
            height: 522px;
            width: 690px;
            margin: auto;
            display: block; */
            display: none;
        }

        #theme-btn {
            border: 2px solid rgb(255, 255, 255);
            background-color: black;
            color: white;
            padding: 3px;
            border-radius: 5px;
            cursor: pointer;
            position: fixed;
            top: 75px;
            right: 5px;
        }
    </style>
</head>
<header ondragstart="return false">
    <a href="/"><img id="logo-img" src="/static/logox.png" alt="logo-icon"></a>
    <div id="search-div">
        <input id="search-box" autocomplete="off" type="text">
        <img id="search-logo" src="/static/search_icon.png" alt="search_icon">
    </div> <!--hidden for students-->
    <a class="header-links" href="/">Home</a>
    <a class="header-links" href="/xlogout">Logout</a>
    <div id="profile">
        <img id="profile-icon" src="/static/profile_icon.webp" alt="profile">
        <div id="username">{{ data.name }}</div>
        <img id="drop-icon" src="/static/drop_arrow_icon.png" alt="drop_icon">
    </div>

</header>

<body>
    <button onclick="theme_change()" id="theme-btn">Dark</button>
    <div id="outer_div">
        <div id="sub_details">
        </div>

    </div>
    {% csrf_token %}
    <script src="/static/js/header.js"></script>
    <script>
        let ccx = "{{ cc }}"
        let stud = "{{ data.email }}";
        let marked_on;
        let id_z;
        let data;
        let sub;
        let div_group;
        let start_time;
        let end_time;
        let room;
        let cur_time = new Date();
        function verify_sub(s_time) {
            cur_time = new Date()
            let h = cur_time.getHours().toString()
            let m = cur_time.getMinutes().toString()
            if (h.length == 1) {
                h = "0" + h
            }
            if (m.length == 1) {
                m = "0" + m
            }
            c_time = h + ":" + m
            //  c_time = "12:44"           //FAKE//FAKE//FAKE//FAKE//FAKE//FAKE

            let c1 = Number.parseInt(c_time.slice(0, 2))
            let c2 = Number.parseInt(c_time.slice(3, 5))
            let s1 = Number.parseInt(s_time.slice(0, 2))
            let s2 = s_time.slice(3, 5)
            if ((s2 == "00") && ((c2 > 49 && c1 == s1 - 1)
                || (c2 < 15 && c1 == s1))) {
                return true
            }
            else if ((s2 == "30") && (c1 == s1) && (c2 > 19 && c2 < 45)) {
                return true
            }



        }
        function get_data() {
            cur_time = new Date()
            let d = cur_time.getDate().toString()
            let g = (cur_time.getMonth() + 1).toString()
            if (d.length == 1) {
                d = "0" + d
            }
            if (g.length == 1) {
                g = "0" + g
            }
            marked_on = d + ":" + g


            let h = cur_time.getHours().toString()
            let m = cur_time.getMinutes().toString()
            if (h.length == 1) {
                h = "0" + h
            }
            if (m.length == 1) {
                m = "0" + m
            }
            cur_time = h + ":" + m

            '{% for x in timetable_d %}'
            if (verify_sub("{{ x.start_time }}")) {
                id_z = "{{ x.subject_reference.id }}"
                sub = "{{ x.subject_reference.sub_name }}";
                div_group = "{{ x.subject_reference.div_group }}"
                start_time = "{{ x.start_time }}"
                end_time = "{{ x.end_time }}"
                room = "{{ x.room }}"
                return true
            }

            '{% endfor %}'

            '{% for x in timetable_d_c %}'
            if (verify_sub("{{ x.start_time }}")) {
                id_z = "{{ x.subject_reference.id }}"
                sub = "{{ x.subject_reference.sub_name }}";
                div_group = "{{ x.subject_reference.div_group }}"
                start_time = "{{ x.start_time }}"
                end_time = "{{ x.end_time }}"
                room = "{{ x.room }}"
                return true
            }
            '{% endfor %}'

        }
        get_data()

        let sub_d = document.getElementById("sub_details")
        function assign() {
            sub_d.innerHTML = `<div class="att">${sub}</div><br><br><div class="att">Div/Group:</div> ${div_group}<br><div class="att">Start:</div> ${start_time}<br><div class="att">End:</div> ${end_time}<br><div class="att">Room:</div><button id="start_attendace" onclick="start_capture()">Start</button> ${room}`;
        }
        if (sub != undefined) {
            assign()
        }
        else {
            window.location.href = "/"
        }


        function start_capture() {

            sub_d.innerHTML = `<div id="cam_div">
                <div id="prn_e"></div>
                <video id='myvideo' src=""> </video>
                <button id="close">STOP</button>
                <canvas id="canvas_x"> </canvas>
                <div>
        </div>
    </div>`;

            let videox = document.getElementById('myvideo')
            let prnx = document.getElementById('prn_e')
            let close_button = document.getElementById('close')
            let canvas = document.getElementById('canvas_x');
            let context = canvas.getContext("2d");
            var processing_img;
            videox.parentElement.parentElement.parentElement.style.marginTop = "3vh"
            videox.parentElement.parentElement.style.paddingBottom = "1vh"
            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        // Does this cookie string begin with the name we want?
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }

                return cookieValue;
            }
            const csrftoken = getCookie('csrftoken');
            videox.addEventListener("playing", () => {
                videox.style.width = videox.videoWidth
                videox.style.height = videox.videoHeight
            })


            function startvideo() {
                navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                    videox.srcObject = stream;
                    videox.play()

                    close_button.addEventListener('click', function stopvideo() {

                        stream.getTracks()[0].stop();
                        clearInterval(processing_img)
                        context.fillStyle = "#ffffff";
                        context.fillRect(0, 0, canvas.width, canvas.height);
                        setTimeout(function v() {
                            window.location.href = "/"
                        }, 1000)

                    })


                    processing_img = setInterval(function take_picture() {

                        if (verify_sub(start_time)) {
                            context.drawImage(videox, 0, 0, canvas.width, canvas.height);
                            data = canvas.toDataURL("image/jpeg", 1.0);
                            data = data.split(',')[1];

                            fetch('/get_img/', {
                                method: 'POST',
                                credentials: 'same-origin',
                                headers: {
                                    'Course': ccx,
                                    'Accept': 'application/json',
                                    'X-Requested-With': 'XMLHttpRequest', //anything to do here for islating users
                                    'X-CSRFToken': csrftoken,
                                    "id": id_z + ":)" + marked_on + "," + start_time + ":)" + stud,

                                },
                                body: JSON.stringify({ 'post_data': data })
                            })
                                .then(response => {
                                    return response.json()
                                })
                                .then(prn => {
                                    prnx.textContent = Object.values(prn)[0];
                                })
                        }
                        else {
                            stream.getTracks()[0].stop();
                            clearInterval(processing_img)
                            context.fillStyle = "#ffffff";
                            context.fillRect(0, 0, canvas.width, canvas.height);
                            setTimeout(function v() {
                                window.location.href = "/"
                            }, 1000)

                        }
                    }, 500)

                })

            };
            startvideo()

        }
        function change_theme_combine(n) {
            let btn = document.getElementById("theme-btn");
            let by = document.getElementsByTagName("body")[0];
            let hr = document.getElementsByTagName("header")[0];
            let sb = document.getElementById("search-box").style;
            let sd = document.getElementById("sub_details");
            if (n == "1") {
                sd.style.color = "black"
                sd.style.backgroundColor = "antiquewhite"
                sd.style.boxShadow=  "0px 0px 20px black";


                btn.textContent = "Dark";
                btn.style.backgroundColor = "black";
                btn.style.color = "white";
                by.className = "white"
                theme = "white";
                hr.style.backgroundColor = "#80ffd4";
                hr.style.color = "black";
                document.getElementsByClassName("header-links")[0].style.color = "#551a8b";
                document.getElementsByClassName("header-links")[1].style.color = "#551a8b";
                sb.color = "black";
                sb.backgroundColor = "white";
                icon_arrow_cross.src = "/static/cross_icon.png"
                icon_arrow_cross.src = "/static/drop_arrow_icon.png"
            }
            else if (n == 2) {
                sd.style.color = "aquamarine"
                sd.style.backgroundColor = "black"
                sd.style.boxShadow=  "0px 0px 20px aqua";
                btn.textContent = "Light";
                btn.style.backgroundColor = "white";
                btn.style.color = "black";
                by.className = "black";
                theme = "black";

                hr.style.backgroundColor = "black";
                hr.style.color = "aqua";
                document.getElementsByClassName("header-links")[0].style.color = "aqua";
                document.getElementsByClassName("header-links")[1].style.color = "aqua";
                sb.color = "white";
                sb.backgroundColor = "black";
                icon_arrow_cross.src = "/static/cross_icon_w.png"
                icon_arrow_cross.src = "/static/drop_arrow_icon_w.png"
            }
        }
        function theme_change() {

            if (sessionStorage.getItem("theme") == "dark") {
                sessionStorage.setItem("theme", "light")
                change_theme_combine("1")
            }
            else if (sessionStorage.getItem("theme") == "light") {
                sessionStorage.setItem("theme", "dark")
                change_theme_combine("2")


            }

        }

        (function () {
            if (sessionStorage.getItem("theme") == null) {
                let darTheme = window.matchMedia("(prefers-color-scheme:dark)");
                if (darTheme.matches) {
                    sessionStorage.setItem("theme", "dark")
                    change_theme_combine("2")

                }
                else {
                    sessionStorage.setItem("theme", "light")
                    change_theme_combine("1")

                }

            }
            else {
                if (sessionStorage.getItem("theme") == "light") {
                    change_theme_combine("1")


                }
                else if (sessionStorage.getItem("theme") == "dark") {
                    change_theme_combine("2")


                }
            }

        })()
    </script>
</body>


</html>
